<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>TinyTS Engine</title>
        <style>
          body {
            margin: 0;
            background: #0b0c10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
          }
          #app {
            position: relative;
            width: 100%;
            height: 100%;
          }
          #app canvas {
            position: absolute;
            top: 0;
            left: 0;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16/9;
          }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
