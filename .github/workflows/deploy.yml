name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build journey-bench
        run: wasm-pack build journey-bench --target web --release

      - name: Build tinyts-bench
        run: |
          cd tinyts-bench
          npm install
          npm run build

      - name: Build bench-data
        run: |
          cd bench-data
          npm install
          npm run build

      - name: Assemble deployment
        run: |
          mkdir -p deploy/journey-bench/pkg deploy/tinyts-bench/font deploy/dist/font deploy/src/font
          cp -r bench-data/dist/* deploy/
          cp journey-bench/index.html deploy/journey-bench/
          cp -r journey-bench/pkg/* deploy/journey-bench/pkg/
          cp -r tinyts-bench/dist/* deploy/tinyts-bench/
          cp tinyts-bench/node_modules/@ujjwalvivek/tinyts/dist/font/tinyTS.woff2 deploy/tinyts-bench/font/
          cp tinyts-bench/node_modules/@ujjwalvivek/tinyts/dist/font/tinyTS.woff2 deploy/dist/font/ 2>/dev/null || true
          cp tinyts-bench/node_modules/@ujjwalvivek/tinyts/dist/font/tinyTS.woff2 deploy/src/font/ 2>/dev/null || true
          cp -r functions deploy/

          cat > deploy/_headers << 'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          EOF

      - name: Deploy to Cloudflare Pages
        if: startsWith(github.ref, 'refs/heads/')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy/ --project-name=gogs --branch=main --commit-dirty=true

      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/')
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create deployment archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd deploy
          zip -r ../gogs-benchmark-${{ steps.tag.outputs.tag }}.zip .
          cd ..

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: gogs-benchmark-${{ steps.tag.outputs.tag }}.zip
          body: |
            # GOGS: Benchmark ${{ steps.tag.outputs.tag }}

            This release contains the benchmark offline package.

            ## Contents

            - **bench-data**: Main benchmark UI and data visualization
            - **journey-bench**: Journey (Rust/WASM) benchmark engine
            - **tinyts-bench**: TinyTS (TypeScript) benchmark engine

            ## Quick Start

            1. Extract the zip file.
            2. Serve locally with any HTTP server.

            ## Documentation

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed benchmark documentation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
